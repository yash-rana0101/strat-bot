version: "3.8"

services:
  strat-ai-bot:
    build: .
    container_name: strat-ai-discord
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot-data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
    driver: local
